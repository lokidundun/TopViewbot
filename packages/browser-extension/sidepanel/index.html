<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TopViewbot Browser Control</title>
    <style>
      :root {
        color-scheme: light;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f4f7fb;
        color: #122033;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background:
          radial-gradient(circle at top right, rgba(79, 124, 255, 0.14), transparent 32%),
          linear-gradient(180deg, #f8fbff 0%, #eef4fb 100%);
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 12px 14px;
        border-bottom: 1px solid rgba(18, 32, 51, 0.08);
        background: rgba(255, 255, 255, 0.84);
        backdrop-filter: blur(8px);
      }

      .title {
        font-size: 14px;
        font-weight: 700;
      }

      #status {
        font-size: 12px;
        color: #6c7a90;
      }

      #status.connected {
        color: #14774b;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 8px 12px;
        background: #1f5eff;
        color: white;
        cursor: pointer;
        font-size: 12px;
      }

      main {
        position: relative;
        flex: 1;
        min-height: 0;
      }

      #app-frame {
        border: 0;
        width: 100%;
        height: 100%;
        min-height: calc(100vh - 62px);
        background: white;
      }

      #fallback {
        display: none;
        box-sizing: border-box;
        margin: 16px;
        padding: 16px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.95);
        border: 1px solid rgba(18, 32, 51, 0.08);
      }

      #fallback.visible {
        display: block;
      }

      code {
        display: inline-block;
        margin-top: 8px;
        padding: 4px 6px;
        border-radius: 8px;
        background: #eef3ff;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <div class="title">TopViewbot Side Panel</div>
        <div id="status">checking relay...</div>
      </div>
      <button id="reload" type="button">Reload</button>
    </header>
    <main>
      <section id="fallback" aria-live="polite">
        <strong>Unable to load the embedded UI.</strong>
        <div id="fallback-copy">The side panel will retry the configured server URL below.</div>
        <code id="target-url"></code>
      </section>
      <iframe id="app-frame" title="TopViewbot UI"></iframe>
    </main>
    <script type="module" src="/src/sidepanel/index.ts"></script>
  </body>
</html>
